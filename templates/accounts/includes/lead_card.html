<article class="rounded-xl border-l-[3px] bg-white p-3 shadow-sm {% if lead.status == 'new' %}border-blue-500{% elif lead.status == 'contacted' %}border-amber-500{% elif lead.status == 'confirmed' %}border-indigo-500{% elif lead.status == 'completed' %}border-emerald-500{% elif lead.status == 'cancelled' %}border-red-500{% else %}border-gray-400{% endif %}">
<div class="flex items-start justify-between gap-2"><div class="min-w-0"><h2 class="truncate text-[13px] font-black">{{ lead.patient_name }}</h2><a href="tel:{{ lead.phone }}" class="mt-0.5 block text-[11px] font-extrabold text-primary"><i class="fa-solid fa-phone mr-1 text-[9px]"></i>{{ lead.phone }}</a></div><time class="shrink-0 text-[8px] font-bold text-gray-400">{{ lead.created_at|date:"d M, g:i A" }}</time></div>
{% if lead.doctor %}<p class="mt-2 truncate rounded-md bg-indigo-50 px-2 py-1.5 text-[10px] font-extrabold text-indigo-700"><i class="fa-solid fa-user-doctor mr-1"></i>{{ lead.doctor.name }}</p>{% endif %}{% if lead.service %}<p class="mt-1.5 truncate text-[10px] font-bold text-gray-600">Service: {{ lead.service }}</p>{% endif %}{% if lead.message %}<p class="mt-1.5 line-clamp-2 text-[10px] font-semibold leading-snug text-textMuted">{{ lead.message }}</p>{% endif %}
<div class="mt-2.5 flex gap-2 border-t border-gray-100 pt-2"><form data-lead-action method="post" action="{% url 'businesses:lead-action' business.slug lead.id %}" class="flex-1">{% csrf_token %}<select name="status" onchange="this.form.requestSubmit()" class="w-full rounded-md border border-gray-200 bg-white px-2 py-1.5 text-[9px] font-black">{% for value, label in lead_statuses %}<option value="{{ value }}" {% if lead.status == value %}selected{% endif %}>{{ label }}</option>{% endfor %}</select></form><form data-lead-action method="post" action="{% url 'businesses:lead-action' business.slug lead.id %}">{% csrf_token %}<input type="hidden" name="action" value="archive"><button class="rounded-md border border-red-100 bg-red-50 px-2.5 py-1.5 text-[9px] font-black text-red-600" aria-label="Archive lead"><i class="fa-solid fa-box-archive"></i></button></form></div>
</article>
