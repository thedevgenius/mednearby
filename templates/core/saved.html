{% extends "base.html" %}

{% block title %}Saved | MedNearby{% endblock %}

{% block content %}
<main id="saved-page" data-items-url="{% url 'core:saved-items' %}" class="app-container min-h-dvh bg-gray-50">
    <header class="sticky top-0 z-30 flex items-center gap-3 border-b border-gray-100 bg-white/95 px-3 py-3 backdrop-blur-md">
        <a href="{% url 'core:home' %}" data-back-button class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full border border-gray-100 bg-gray-50 text-textMain transition-transform active:scale-95" aria-label="Go back"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i></a>
        <div class="min-w-0">
            <h1 class="text-xl font-black text-textMain">Saved</h1>
            <p class="mt-0.5 truncate text-[11px] font-semibold text-textMuted">Doctors and healthcare providers saved on this device.</p>
        </div>
    </header>

    <div class="space-y-7 px-3 py-5">
        <section aria-labelledby="saved-doctors-title">
            <div class="mb-3 flex items-center justify-between">
                <h2 id="saved-doctors-title" class="text-base font-black text-textMain">Doctors</h2>
                <span id="saved-doctors-count" class="rounded-full bg-emerald-50 px-2 py-1 text-[10px] font-black text-primary">0</span>
            </div>
            <div id="saved-doctors" class="space-y-3"></div>
        </section>

        <section aria-labelledby="saved-businesses-title">
            <div class="mb-3 flex items-center justify-between">
                <h2 id="saved-businesses-title" class="text-base font-black text-textMain">Businesses</h2>
                <span id="saved-businesses-count" class="rounded-full bg-indigo-50 px-2 py-1 text-[10px] font-black text-indigo-600">0</span>
            </div>
            <div id="saved-businesses" class="space-y-3"></div>
        </section>
    </div>
</main>
{% endblock %}

{% block extra_js %}
<script>
(() => {
    const escapeHtml = value => { const node = document.createElement("div"); node.textContent = value || ""; return node.innerHTML; };
    const empty = label => `<div class="rounded-2xl border border-dashed border-gray-200 bg-white px-5 py-7 text-center"><i class="fa-regular fa-bookmark text-2xl text-gray-300"></i><p class="mt-2 text-xs font-bold text-gray-400">No saved ${label} yet</p></div>`;
    const card = (item, type) => {
        item.type = type;
        const detail = item.type === "doctor"
            ? `${item.specialty ? `<p class="mt-1 truncate text-[11px] font-extrabold text-indigo-600">${escapeHtml(item.specialty)}</p>` : ""}${item.qualification ? `<p class="mt-0.5 truncate text-[10px] font-semibold text-textMuted">${escapeHtml(item.qualification)}</p>` : ""}${item.fees ? `<p class="mt-1 text-[11px] font-black text-primary">₹${escapeHtml(item.fees)} <span class="font-semibold text-gray-400">Consultation Fee</span></p>` : ""}`
            : `${item.category ? `<p class="mt-1 truncate text-[10px] font-black uppercase tracking-wide text-indigo-600">${escapeHtml(item.category)}</p>` : ""}${item.address ? `<p class="mt-1 line-clamp-2 text-[11px] font-semibold text-textMuted">${escapeHtml(item.address)}</p>` : ""}`;
        return `<article class="relative rounded-2xl border border-gray-100 bg-white p-3 shadow-sm"><a href="${escapeHtml(item.url)}" class="flex items-center gap-3 pr-10"><div class="flex h-16 w-16 shrink-0 items-center justify-center overflow-hidden rounded-xl border border-gray-100 bg-gray-50 text-2xl text-primary">${item.image ? `<img src="${escapeHtml(item.image)}" alt="" class="h-full w-full object-cover">` : `<i class="fa-solid ${item.type === "doctor" ? "fa-user-doctor" : "fa-hospital"}"></i>`}</div><div class="min-w-0 flex-1"><h3 class="truncate text-[15px] font-black text-textMain">${escapeHtml(item.name)}</h3>${detail}</div></a><button type="button" data-save-item data-save-type="${item.type}" data-save-slug="${escapeHtml(item.slug)}" data-save-name="${escapeHtml(item.name)}" class="absolute right-3 top-3 flex h-9 w-9 items-center justify-center rounded-full bg-rose-50 text-rose-500" aria-label="Remove ${escapeHtml(item.name)}"><i class="fa-solid fa-bookmark"></i></button></article>`;
    };
    const render = async () => {
        const state = window.MedNearbySaved.read();
        const url = new URL(document.getElementById("saved-page").dataset.itemsUrl, location.origin);
        state.doctors.forEach(slug => url.searchParams.append("doctor", slug));
        state.businesses.forEach(slug => url.searchParams.append("business", slug));
        try {
            const response = await fetch(url, { headers: { "X-Requested-With": "XMLHttpRequest" } });
            if (!response.ok) throw new Error("Unable to load saved items");
            const data = await response.json();
            document.getElementById("saved-doctors").innerHTML = data.doctors.length ? data.doctors.map(item => card(item, "doctor")).join("") : empty("doctors");
            document.getElementById("saved-businesses").innerHTML = data.businesses.length ? data.businesses.map(item => card(item, "business")).join("") : empty("businesses");
            document.getElementById("saved-doctors-count").textContent = data.doctors.length;
            document.getElementById("saved-businesses-count").textContent = data.businesses.length;
            window.MedNearbySaved.refresh(document);
        } catch (_) {
            document.getElementById("saved-doctors").innerHTML = empty("items — please try again");
            document.getElementById("saved-businesses").innerHTML = "";
        }
    };
    render();
    document.addEventListener("saved-items:changed", render);
})();
</script>
{% endblock %}
