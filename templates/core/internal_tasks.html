<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Business Hours JSON Generator</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #f5f6f8;
            color: #171717;
            font-family:
                Inter,
                ui-sans-serif,
                system-ui,
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                sans-serif;
        }

        button,
        input {
            font: inherit;
        }

        .container {
            width: min(960px, calc(100% - 32px));
            margin: 40px auto;
        }

        .header {
            margin-bottom: 24px;
        }

        .header h1 {
            margin: 0 0 8px;
            font-size: clamp(26px, 4vw, 38px);
            line-height: 1.1;
        }

        .header p {
            margin: 0;
            color: #686868;
            line-height: 1.6;
        }

        .card {
            overflow: hidden;
            border: 1px solid #e3e3e3;
            border-radius: 18px;
            background: #ffffff;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
        }

        .day {
            padding: 20px;
            border-bottom: 1px solid #eeeeee;
        }

        .day:last-child {
            border-bottom: 0;
        }

        .day-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .day-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .day-title h2 {
            min-width: 105px;
            margin: 0;
            font-size: 17px;
        }

        .status {
            color: #777777;
            font-size: 13px;
        }

        .status.open {
            color: #16803c;
        }

        .toggle {
            position: relative;
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }

        .toggle input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .toggle-track {
            position: relative;
            width: 46px;
            height: 26px;
            border-radius: 999px;
            background: #d8d8d8;
            transition: 0.2s ease;
        }

        .toggle-track::after {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: 0.2s ease;
            content: "";
        }

        .toggle input:checked + .toggle-track {
            background: #171717;
        }

        .toggle input:checked + .toggle-track::after {
            transform: translateX(20px);
        }

        .slots {
            display: grid;
            gap: 10px;
            margin-top: 16px;
        }

        .slots.hidden {
            display: none;
        }

        .slot-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr auto;
            align-items: center;
            gap: 10px;
        }

        .time-input {
            width: 100%;
            min-height: 44px;
            padding: 9px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 10px;
            background: #ffffff;
            color: #171717;
            outline: none;
        }

        .time-input:focus {
            border-color: #171717;
            box-shadow: 0 0 0 3px rgba(23, 23, 23, 0.08);
        }

        .separator {
            color: #777777;
            font-size: 14px;
        }

        .remove-button,
        .add-button,
        .action-button {
            border: 0;
            cursor: pointer;
            transition:
                transform 0.15s ease,
                background 0.15s ease;
        }

        .remove-button:active,
        .add-button:active,
        .action-button:active {
            transform: scale(0.97);
        }

        .remove-button {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: #fff0f0;
            color: #bf2222;
            font-size: 20px;
            line-height: 1;
        }

        .remove-button:hover {
            background: #ffe2e2;
        }

        .add-button {
            justify-self: start;
            margin-top: 2px;
            padding: 9px 13px;
            border-radius: 9px;
            background: #f0f0f0;
            color: #202020;
            font-weight: 600;
            font-size: 13px;
        }

        .add-button:hover {
            background: #e5e5e5;
        }

        .error-message {
            display: none;
            margin-top: 8px;
            color: #c62828;
            font-size: 13px;
        }

        .error-message.visible {
            display: block;
        }

        .output-section {
            margin-top: 24px;
        }

        .output-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 12px;
        }

        .output-header h2 {
            margin: 0;
            font-size: 20px;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .action-button {
            min-height: 40px;
            padding: 9px 15px;
            border-radius: 10px;
            background: #171717;
            color: #ffffff;
            font-weight: 600;
            font-size: 13px;
        }

        .action-button.secondary {
            border: 1px solid #dddddd;
            background: #ffffff;
            color: #171717;
        }

        .action-button:hover {
            opacity: 0.88;
        }

        .json-output {
            width: 100%;
            min-height: 360px;
            resize: vertical;
            padding: 18px;
            border: 1px solid #dedede;
            border-radius: 14px;
            background: #101010;
            color: #eaeaea;
            font-family:
                "SFMono-Regular",
                Consolas,
                "Liberation Mono",
                monospace;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
        }

        .global-error {
            display: none;
            margin: 0 0 12px;
            padding: 12px 14px;
            border: 1px solid #ffc9c9;
            border-radius: 10px;
            background: #fff2f2;
            color: #a31d1d;
            font-size: 14px;
        }

        .global-error.visible {
            display: block;
        }

        .toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 100;
            padding: 12px 16px;
            border-radius: 10px;
            background: #171717;
            color: #ffffff;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(12px);
            transition: 0.2s ease;
        }

        .toast.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 640px) {
            .container {
                width: min(100% - 20px, 960px);
                margin: 20px auto;
            }

            .day {
                padding: 16px;
            }

            .day-header {
                align-items: flex-start;
            }

            .day-title {
                display: block;
            }

            .day-title h2 {
                margin-bottom: 4px;
            }

            .slot-row {
                grid-template-columns: 1fr 20px 1fr 40px;
                gap: 6px;
            }

            .output-header {
                align-items: flex-start;
                flex-direction: column;
            }

            .actions {
                width: 100%;
            }

            .action-button {
                flex: 1;
            }
        }
    </style>
</head>

<body>
    <main class="container">
        <header class="header">
            <h1>Business Hours</h1>
            <p>
                Enable a day and add one or more opening slots.
                Overnight slots such as 22:00 to 02:00 are supported.
            </p>
        </header>

        <section id="hoursContainer" class="card"></section>

        <section class="output-section">
            <div class="output-header">
                <h2>Generated JSON</h2>

                <div class="actions">
                    <button
                        id="resetButton"
                        class="action-button secondary"
                        type="button"
                    >
                        Reset
                    </button>

                    <button
                        id="copyButton"
                        class="action-button secondary"
                        type="button"
                    >
                        Copy JSON
                    </button>

                    <button
                        id="downloadButton"
                        class="action-button"
                        type="button"
                    >
                        Download JSON
                    </button>
                </div>
            </div>

            <div id="globalError" class="global-error"></div>

            <textarea
                id="jsonOutput"
                class="json-output"
                readonly
                spellcheck="false"
            ></textarea>
        </section>
    </main>

    <div id="toast" class="toast"></div>

    <script>
        const DAYS = [
            { key: "0", name: "Monday" },
            { key: "1", name: "Tuesday" },
            { key: "2", name: "Wednesday" },
            { key: "3", name: "Thursday" },
            { key: "4", name: "Friday" },
            { key: "5", name: "Saturday" },
            { key: "6", name: "Sunday" }
        ];

        const DEFAULT_SLOT = {
            opens_at: "09:00",
            closes_at: "18:00"
        };

        const state = createInitialState();

        const hoursContainer =
            document.getElementById("hoursContainer");

        const jsonOutput =
            document.getElementById("jsonOutput");

        const globalError =
            document.getElementById("globalError");

        const toast =
            document.getElementById("toast");

        function createInitialState() {
            return DAYS.reduce((result, day) => {
                result[day.key] = {
                    enabled: false,
                    slots: []
                };

                return result;
            }, {});
        }

        function render() {
            hoursContainer.innerHTML = "";

            DAYS.forEach((day) => {
                hoursContainer.appendChild(
                    createDayElement(day)
                );
            });

            updateJSON();
        }

        function createDayElement(day) {
            const dayState = state[day.key];

            const dayElement =
                document.createElement("div");

            dayElement.className = "day";
            dayElement.dataset.day = day.key;

            const header =
                document.createElement("div");

            header.className = "day-header";

            const titleContainer =
                document.createElement("div");

            titleContainer.className = "day-title";

            const title =
                document.createElement("h2");

            title.textContent = day.name;

            const status =
                document.createElement("span");

            status.className =
                dayState.enabled
                    ? "status open"
                    : "status";

            status.textContent =
                dayState.enabled
                    ? `${dayState.slots.length} slot${
                        dayState.slots.length === 1 ? "" : "s"
                    }`
                    : "Closed";

            titleContainer.append(title, status);

            const toggleLabel =
                document.createElement("label");

            toggleLabel.className = "toggle";
            toggleLabel.setAttribute(
                "aria-label",
                `Toggle ${day.name}`
            );

            const toggleInput =
                document.createElement("input");

            toggleInput.type = "checkbox";
            toggleInput.checked = dayState.enabled;

            toggleInput.addEventListener("change", () => {
                dayState.enabled = toggleInput.checked;

                if (
                    dayState.enabled &&
                    dayState.slots.length === 0
                ) {
                    dayState.slots.push({
                        ...DEFAULT_SLOT
                    });
                }

                if (!dayState.enabled) {
                    dayState.slots = [];
                }

                render();
            });

            const toggleTrack =
                document.createElement("span");

            toggleTrack.className = "toggle-track";

            toggleLabel.append(
                toggleInput,
                toggleTrack
            );

            header.append(
                titleContainer,
                toggleLabel
            );

            const slotsContainer =
                document.createElement("div");

            slotsContainer.className =
                dayState.enabled
                    ? "slots"
                    : "slots hidden";

            dayState.slots.forEach((slot, index) => {
                slotsContainer.appendChild(
                    createSlotRow(
                        day,
                        slot,
                        index
                    )
                );
            });

            if (dayState.enabled) {
                const addButton =
                    document.createElement("button");

                addButton.type = "button";
                addButton.className = "add-button";
                addButton.textContent = "+ Add another slot";

                addButton.addEventListener("click", () => {
                    const previousSlot =
                        dayState.slots[
                            dayState.slots.length - 1
                        ];

                    dayState.slots.push(
                        getNextSuggestedSlot(previousSlot)
                    );

                    render();
                });

                slotsContainer.appendChild(addButton);
            }

            const errorElement =
                document.createElement("div");

            errorElement.className = "error-message";
            errorElement.id = `error-${day.key}`;

            dayElement.append(
                header,
                slotsContainer,
                errorElement
            );

            return dayElement;
        }

        function createSlotRow(day, slot, index) {
            const row =
                document.createElement("div");

            row.className = "slot-row";

            const opensInput =
                createTimeInput(
                    slot.opens_at,
                    `${day.name} opening time`
                );

            const separator =
                document.createElement("span");

            separator.className = "separator";
            separator.textContent = "to";

            const closesInput =
                createTimeInput(
                    slot.closes_at,
                    `${day.name} closing time`
                );

            const removeButton =
                document.createElement("button");

            removeButton.type = "button";
            removeButton.className = "remove-button";
            removeButton.innerHTML = "&times;";
            removeButton.title = "Remove slot";
            removeButton.setAttribute(
                "aria-label",
                `Remove slot ${index + 1} from ${day.name}`
            );

            opensInput.addEventListener("input", () => {
                slot.opens_at = opensInput.value;
                updateJSON();
            });

            closesInput.addEventListener("input", () => {
                slot.closes_at = closesInput.value;
                updateJSON();
            });

            removeButton.addEventListener("click", () => {
                const dayState = state[day.key];

                dayState.slots.splice(index, 1);

                if (dayState.slots.length === 0) {
                    dayState.enabled = false;
                }

                render();
            });

            row.append(
                opensInput,
                separator,
                closesInput,
                removeButton
            );

            return row;
        }

        function createTimeInput(value, label) {
            const input =
                document.createElement("input");

            input.type = "time";
            input.className = "time-input";
            input.value = value;
            input.required = true;
            input.step = 60;
            input.setAttribute("aria-label", label);

            return input;
        }

        function getNextSuggestedSlot(previousSlot) {
            if (!previousSlot) {
                return { ...DEFAULT_SLOT };
            }

            const previousClose =
                timeToMinutes(previousSlot.closes_at);

            const opensAt =
                (previousClose + 60) % 1440;

            const closesAt =
                (opensAt + 180) % 1440;

            return {
                opens_at: minutesToTime(opensAt),
                closes_at: minutesToTime(closesAt)
            };
        }

        function updateJSON() {
            clearErrors();

            const validation = validateHours();

            if (!validation.valid) {
                jsonOutput.value = "";
                showGlobalError(
                    "Fix the highlighted business-hour errors."
                );

                validation.errors.forEach((error) => {
                    showDayError(error.day, error.message);
                });

                return;
            }

            hideGlobalError();

            const result = {};

            DAYS.forEach((day) => {
                const dayState = state[day.key];

                result[day.key] = dayState.enabled
                    ? dayState.slots.map((slot) => ({
                        opens_at: slot.opens_at,
                        closes_at: slot.closes_at
                    }))
                    : [];
            });

            jsonOutput.value =
                JSON.stringify(result, null, 2);
        }

        function validateHours() {
            const errors = [];
            const weeklyRanges = [];

            DAYS.forEach((day) => {
                const dayState = state[day.key];

                if (!dayState.enabled) {
                    return;
                }

                if (dayState.slots.length === 0) {
                    errors.push({
                        day: day.key,
                        message:
                            "Add at least one slot or mark the day closed."
                    });

                    return;
                }

                dayState.slots.forEach((slot, index) => {
                    const slotNumber = index + 1;

                    if (
                        !isValidTime(slot.opens_at) ||
                        !isValidTime(slot.closes_at)
                    ) {
                        errors.push({
                            day: day.key,
                            message:
                                `Slot ${slotNumber} must contain valid opening and closing times.`
                        });

                        return;
                    }

                    if (
                        slot.opens_at === slot.closes_at
                    ) {
                        errors.push({
                            day: day.key,
                            message:
                                `Slot ${slotNumber} cannot have identical opening and closing times.`
                        });

                        return;
                    }

                    const ranges = normalizeSlot(
                        Number(day.key),
                        slot.opens_at,
                        slot.closes_at
                    );

                    ranges.forEach((range) => {
                        const overlap =
                            weeklyRanges.find(
                                (existing) =>
                                    range.start <
                                        existing.end &&
                                    existing.start <
                                        range.end
                            );

                        if (overlap) {
                            errors.push({
                                day: day.key,
                                message:
                                    `Slot ${slotNumber} overlaps another business-hour slot.`
                            });
                        } else {
                            weeklyRanges.push({
                                ...range,
                                day: day.key,
                                slot: slotNumber
                            });
                        }
                    });
                });
            });

            return {
                valid: errors.length === 0,
                errors
            };
        }

        function normalizeSlot(
            weekday,
            opensAt,
            closesAt
        ) {
            const minutesPerDay = 1440;
            const minutesPerWeek = 10080;

            const openingMinutes =
                timeToMinutes(opensAt);

            const closingMinutes =
                timeToMinutes(closesAt);

            const start =
                weekday * minutesPerDay +
                openingMinutes;

            let end;

            if (closingMinutes > openingMinutes) {
                end =
                    weekday * minutesPerDay +
                    closingMinutes;
            } else {
                end =
                    (weekday + 1) * minutesPerDay +
                    closingMinutes;
            }

            if (end <= minutesPerWeek) {
                return [{ start, end }];
            }

            return [
                {
                    start,
                    end: minutesPerWeek
                },
                {
                    start: 0,
                    end: end - minutesPerWeek
                }
            ];
        }

        function timeToMinutes(value) {
            const [hour, minute] =
                value.split(":").map(Number);

            return hour * 60 + minute;
        }

        function minutesToTime(totalMinutes) {
            const normalized =
                ((totalMinutes % 1440) + 1440) % 1440;

            const hours =
                Math.floor(normalized / 60);

            const minutes =
                normalized % 60;

            return `${String(hours).padStart(
                2,
                "0"
            )}:${String(minutes).padStart(2, "0")}`;
        }

        function isValidTime(value) {
            return /^([01]\d|2[0-3]):[0-5]\d$/.test(
                value
            );
        }

        function showDayError(dayKey, message) {
            const element =
                document.getElementById(
                    `error-${dayKey}`
                );

            if (!element) {
                return;
            }

            const existingMessages =
                element.textContent
                    ? element.textContent.split(" ")
                    : [];

            if (
                !existingMessages.includes(message)
            ) {
                element.textContent = message;
            }

            element.classList.add("visible");
        }

        function clearErrors() {
            document
                .querySelectorAll(".error-message")
                .forEach((element) => {
                    element.textContent = "";
                    element.classList.remove("visible");
                });
        }

        function showGlobalError(message) {
            globalError.textContent = message;
            globalError.classList.add("visible");
        }

        function hideGlobalError() {
            globalError.textContent = "";
            globalError.classList.remove("visible");
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add("visible");

            window.clearTimeout(showToast.timeout);

            showToast.timeout = window.setTimeout(
                () => {
                    toast.classList.remove("visible");
                },
                2000
            );
        }

        document
            .getElementById("copyButton")
            .addEventListener("click", async () => {
                updateJSON();

                if (!jsonOutput.value) {
                    return;
                }

                try {
                    await navigator.clipboard.writeText(
                        jsonOutput.value
                    );

                    showToast("JSON copied");
                } catch {
                    jsonOutput.select();
                    document.execCommand("copy");
                    showToast("JSON copied");
                }
            });

        document
            .getElementById("downloadButton")
            .addEventListener("click", () => {
                updateJSON();

                if (!jsonOutput.value) {
                    return;
                }

                const blob = new Blob(
                    [jsonOutput.value],
                    {
                        type: "application/json"
                    }
                );

                const url =
                    URL.createObjectURL(blob);

                const link =
                    document.createElement("a");

                link.href = url;
                link.download =
                    "business-hours.json";

                document.body.appendChild(link);
                link.click();
                link.remove();

                URL.revokeObjectURL(url);

                showToast("JSON downloaded");
            });

        document
            .getElementById("resetButton")
            .addEventListener("click", () => {
                DAYS.forEach((day) => {
                    state[day.key] = {
                        enabled: false,
                        slots: []
                    };
                });

                render();
                showToast("Business hours reset");
            });

        render();
    </script>
</body>
</html>
